name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Firebase web config — these are public values (security is enforced by
    # firestore.rules, not by keeping them secret), so it is fine to inline them
    # here. To rotate or change projects, edit these or move them to repo
    # Settings → Secrets and variables → Actions.
    env:
      VITE_FIREBASE_API_KEY: AIzaSyBYufI40Qe-6rHDVizgMehhgLY-wSpMEGM
      VITE_FIREBASE_AUTH_DOMAIN: msbp-project-manager.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: msbp-project-manager
      VITE_FIREBASE_STORAGE_BUCKET: msbp-project-manager.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "921712837669"
      VITE_FIREBASE_APP_ID: "1:921712837669:web:619ca6dfb84d4864c72bcc"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
